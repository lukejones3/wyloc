<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Wyloc</title>
    <style>
      :root {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        width: 280px;
        margin: 0;
        padding: 14px 16px;
        color: #222;
        background: #fff;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 2px;
      }
      .sub {
        font-size: 11px;
        color: #888;
        margin: 0 0 12px;
      }
      .stats {
        display: flex;
        gap: 10px;
        margin-bottom: 12px;
      }
      .stat {
        flex: 1;
        border: 1px solid #eee;
        border-radius: 8px;
        padding: 8px 10px;
      }
      .stat b {
        display: block;
        font-size: 20px;
      }
      .stat span {
        font-size: 10px;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      ul {
        list-style: none;
        margin: 0 0 12px;
        padding: 0;
      }
      li {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        padding: 4px 0;
        border-bottom: 1px solid #f3f3f3;
      }
      li.empty {
        color: #999;
        justify-content: center;
        border: none;
        padding: 14px 0;
      }
      button {
        font: inherit;
        font-size: 11px;
        color: #888;
        background: transparent;
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 5px 10px;
        cursor: pointer;
      }
      button:hover {
        color: #444;
      }
      .footer {
        font-size: 10px;
        color: #aaa;
        margin-top: 10px;
      }
      .map-section {
        display: none;
        margin-bottom: 12px;
      }
      .map-head {
        font-size: 11px;
        font-weight: 600;
        color: #444;
        margin: 0 0 2px;
      }
      .map-note {
        font-size: 10px;
        color: #999;
        margin: 0 0 6px;
      }
      li.map {
        display: flex;
        flex-direction: column;
        gap: 2px;
        align-items: stretch;
        cursor: pointer;
        padding: 6px 4px;
      }
      li.map:hover {
        background: #f7f7f7;
      }
      li.map code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        word-break: break-all;
        white-space: normal;
      }
      li.map .mock {
        color: #999;
      }
      li.map .real {
        color: #1a1a1a;
      }
      li.map.copied .real::after {
        content: " ✓ copied";
        color: #2f6f4f;
        font-family: -apple-system, sans-serif;
      }
    </style>
  </head>
  <body>
    <h1>Wyloc — Prompt Secret Guard</h1>
    <p class="sub">Local-only. No sign-in. No telemetry.</p>

    <div class="stats">
      <div class="stat">
        <b id="total">0</b>
        <span>Caught</span>
      </div>
      <div class="stat">
        <b id="blocked">0</b>
        <span>Blocked</span>
      </div>
    </div>

    <ul id="breakdown"></ul>

    <div class="map-section" id="mappings-section">
      <p class="map-head">Swapped secrets (this tab)</p>
      <p class="map-note">
        Real values live only in this tab's memory and vanish when it
        closes. Click a row to copy.
      </p>
      <ul id="mappings"></ul>
    </div>

    <button id="clear">Clear local history</button>
    <p class="footer">
      Counts are stored only on this device.
    </p>

    <script src="popup.js" type="module"></script>
  </body>
</html>
